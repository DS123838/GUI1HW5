<!--
    File: index_without_ec.html
    Author: Daniyal Soharwardi
    Course: GUI Programming I
    Assignment: HW5: Implementing a Bit of Scrabble with Drag-and-Drop (with Extra Credits)
    Description:
    In this assignment, a small version of scrabble was implemented. This was done using the jquery UI
    and drag and drop features. The game displays a single row of the board, which is 15 lines, bonus points
    squares, and 7 randomly selected letters for the game. The game calculates the point total for each word 
    implemented and stores it, until reaching a goal of 100 points. Overall, it was a pretty fun thing to make,
    and I learned a lot of front end UI stuff for jquery and css. 

    Sources:
    https://jqueryui.com/
    https://jqueryui.com/draggable/
    https://stackoverflow.com/questions/43443461/jquery-ui-drag-and-drop
    tile images from scrabble_tiles/ folder
    https://jquery.com/
    https://www.youtube.com/watch?v=MAksqwPV-6w
    https://stackoverflow.com/questions/52293118/drag-and-drop-images-using-jquery-replacing-them
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW5 - Scrabble</title>
 
    <!-- jquery UI CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
 
    <!-- stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
    <h1>Scrabble</h1>
    <p id="instructions">Drag tiles from your rack onto the board. Tiles must be placed next to each other with no gaps. Click <strong>Submit Word</strong> when done!</p>
 
    <!-- scoreboard -->
    <div id="scoreboard">
        <div class="score-box">
            <span class="score-label">Word Score</span>
            <span class="score-value" id="word-score">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">Total Score</span>
            <span class="score-value" id="total-score">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">Tiles Left</span>
            <span class="score-value" id="tiles-left">100</span>
        </div>
    </div>
 
    <!-- word dsiplay -->
    <div id="word-display-area">
        <span class="score-label">Current Word: </span>
        <span id="current-word">—</span>
    </div>
 
    <!-- board -->

    <div id="board-area">
        <h2>Board</h2>
        <div id="board">
            <div class="board-square" data-index="0"  data-type="normal"></div>
            <div class="board-square" data-index="1"  data-type="normal"></div>
            <div class="board-square" data-index="2"  data-type="DW">
                <span class="square-label">DW</span>
            </div>
            <div class="board-square" data-index="3"  data-type="normal"></div>
            <div class="board-square" data-index="4"  data-type="normal"></div>
            <div class="board-square" data-index="5"  data-type="normal"></div>
            <div class="board-square" data-index="6"  data-type="DL">
                <span class="square-label">DL</span>
            </div>
            <div class="board-square" data-index="7"  data-type="normal"></div>
            <div class="board-square" data-index="8"  data-type="DL">
                <span class="square-label">DL</span>
            </div>
            <div class="board-square" data-index="9"  data-type="normal"></div>
            <div class="board-square" data-index="10" data-type="normal"></div>
            <div class="board-square" data-index="11" data-type="normal"></div>
            <div class="board-square" data-index="12" data-type="DW">
                <span class="square-label">DW</span>
            </div>
            <div class="board-square" data-index="13" data-type="normal"></div>
            <div class="board-square" data-index="14" data-type="normal"></div>
        </div>
    </div>
 
    <!-- tile rack -->
    <div id="rack-area">
        <h2>Your Tiles</h2>
        <div id="rack">
        </div>
    </div>
 
    <!-- buttons -->
    <div id="button-area">
        <button id="submit-btn">Submit Word</button>
        <button id="deal-btn">Deal New Tiles</button>
        <button id="reset-btn">New Game</button>
    </div>
 
    <!-- message area-->
    <div id="message-area">
        <p id="message"></p>
    </div>
 
    <!-- jquery + jquery UI -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
 
    <!-- scrabble tile data -->
    <script src="graphics_data/Scrabble_Pieces_AssociativeArray_Jesse.js"></script>
 
    <!-- script -->
    <script src="js/script.js"></script>
 
</body>
</html>
